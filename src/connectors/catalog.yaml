  # Composio-backed Gmail. Stopgap until our own Google OAuth client
  # passes restricted-scope verification — Composio holds the
  # vendor's tokens and exposes the toolkit through a per-session
  # MCP URL. The URL here is a placeholder: at install time the
  # platform calls `composio.create(userId, { authConfigs: { gmail:
  # <ac_…> } })` and replaces it with the returned `session.mcp.url`.
  # The x-api-key header value is resolved at start time from
  # process.env (never persisted to workspace.json).
  - name: com.google/gmail
    title: Gmail
    description: Read, send, and draft mail (via Composio)
    version: "0.1.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/gmail.png
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://backend.composio.dev/v3/mcp
    _meta:
      ai.nimblebrain/connector:
        defaultBinding: workspace
        auth: composio
        composio:
          toolkit: gmail
          authConfigEnv: COMPOSIO_GMAIL_AUTH_CONFIG_ID
          # Curated working set. Composio's Gmail toolkit publishes
          # ~60 tools; exposing all of them blows up the agent's
          # tool-search context. Add to this list when a user need
          # surfaces; default tight.
          #
          # NOTE: the allowlist is necessary but not sufficient for the
          # destructive tools below. Composio gates delete/trash at the
          # project level — an allowlisted-but-disabled tool returns
          # "execution disabled for this project" rather than running.
          # Enable them on the gmail auth_config in the Composio
          # dashboard, and re-install the connector per workspace so the
          # session is minted with the updated tool filter (the filter
          # is baked at session-create time; see connector-tools.ts).
          #
          # GMAIL_DELETE_MESSAGE is deliberately omitted: it permanently
          # deletes arbitrary mail (users.messages.delete — bypasses
          # Trash, non-recoverable), exceeds the draft-pruning need, and
          # GMAIL_MOVE_TO_TRASH already covers reversible removal. Add it
          # only if a concrete purge-real-mail need surfaces.
          tools:
            - GMAIL_SEND_EMAIL
            - GMAIL_FETCH_EMAILS
            - GMAIL_FETCH_MESSAGE_BY_MESSAGE_ID
            - GMAIL_FETCH_MESSAGE_BY_THREAD_ID
            - GMAIL_LIST_THREADS
            - GMAIL_LIST_LABELS
            - GMAIL_CREATE_EMAIL_DRAFT
            - GMAIL_SEND_DRAFT
            - GMAIL_LIST_DRAFTS
            - GMAIL_DELETE_DRAFT
            - GMAIL_REPLY_TO_THREAD
            - GMAIL_FORWARD_MESSAGE
            - GMAIL_ADD_LABEL_TO_EMAIL
            - GMAIL_MOVE_TO_TRASH
            - GMAIL_SEARCH_PEOPLE
            - GMAIL_GET_PROFILE
        tags: [email, productivity, composio]

