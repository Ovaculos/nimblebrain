  # Dropbox advertises DCR but only honors it for a curated partner
  # allowlist (Claude Desktop, Cursor, ChatGPT) — `/register` rejects
  # everyone else with "Dynamic client registration is not supported."
  # Wired here as `auth: static` so operators can bring their own
  # OAuth app from the Dropbox App Console. Drop back to `auth: dcr`
  # once #200 outreach lands.
  - name: com.dropbox/mcp
    title: Dropbox
    description: Files, folders, and shared links
    version: "1.0.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/dropbox.png
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://mcp.dropbox.com/mcp
    _meta:
      ai.nimblebrain/connector:
        defaultBinding: workspace
        auth: static
        requiredScopes:
          - files.metadata.read
          - files.content.read
          - files.content.write
          - sharing.write
          - account_info.read
        operatorSetup:
          portalUrl: https://www.dropbox.com/developers/apps
          hint: Create a Scoped Access app in the Dropbox App Console, enable the listed scopes, add the NimbleBrain redirect URI, then paste App key + App secret here
          clientSecretKey: dropbox.client_secret
        tags: [storage, files]

  # com.intercom/mcp: dropped pending vendor host allowlisting.
  # Intercom rejects DCR /register itself with "Redirect URI ... is
  # not in the allowlist, reach out to Intercom Customer Support if
  # you believe we should support it." Re-add once #200 lands.

  # Composio-backed Gmail. Stopgap until our own Google OAuth client
  # passes restricted-scope verification — Composio holds the
  # vendor's tokens and exposes the toolkit through a per-session
  # MCP URL. The URL here is a placeholder: at install time the
  # platform calls `composio.create(userId, { authConfigs: { gmail:
  # <ac_…> } })` and replaces it with the returned `session.mcp.url`.
  # The x-api-key header value is resolved at start time from
  # process.env (never persisted to workspace.json).
  - name: com.google/gmail
    title: Gmail
    description: Read, send, and draft mail (via Composio)
    version: "0.1.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/gmail.png
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://backend.composio.dev/v3/mcp
    _meta:
      ai.nimblebrain/connector:
        defaultBinding: workspace
        auth: composio
        composio:
          toolkit: gmail
          authConfigEnv: COMPOSIO_GMAIL_AUTH_CONFIG_ID
          # Curated working set. Composio's Gmail toolkit publishes
          # ~60 tools; exposing all of them blows up the agent's
          # tool-search context. Add to this list when a user need
          # surfaces; default tight.
          #
          # NOTE: the allowlist is necessary but not sufficient for the
          # destructive tools below. Composio gates delete/trash at the
          # project level — an allowlisted-but-disabled tool returns
          # "execution disabled for this project" rather than running.
          # Enable them on the gmail auth_config in the Composio
          # dashboard, and re-install the connector per workspace so the
          # session is minted with the updated tool filter (the filter
          # is baked at session-create time; see connector-tools.ts).
          #
          # GMAIL_DELETE_MESSAGE is deliberately omitted: it permanently
          # deletes arbitrary mail (users.messages.delete — bypasses
          # Trash, non-recoverable), exceeds the draft-pruning need, and
          # GMAIL_MOVE_TO_TRASH already covers reversible removal. Add it
          # only if a concrete purge-real-mail need surfaces.
          tools:
            - GMAIL_SEND_EMAIL
            - GMAIL_FETCH_EMAILS
            - GMAIL_FETCH_MESSAGE_BY_MESSAGE_ID
            - GMAIL_FETCH_MESSAGE_BY_THREAD_ID
            - GMAIL_LIST_THREADS
            - GMAIL_LIST_LABELS
            - GMAIL_CREATE_EMAIL_DRAFT
            - GMAIL_SEND_DRAFT
            - GMAIL_LIST_DRAFTS
            - GMAIL_DELETE_DRAFT
            - GMAIL_REPLY_TO_THREAD
            - GMAIL_FORWARD_MESSAGE
            - GMAIL_ADD_LABEL_TO_EMAIL
            - GMAIL_MOVE_TO_TRASH
            - GMAIL_SEARCH_PEOPLE
            - GMAIL_GET_PROFILE
        tags: [email, productivity, composio]

  - name: com.microsoft/outlook
    title: Outlook
    description: Read, send, and draft mail (via Composio)
    version: "0.1.0"
    icons:
      - src: https://static.nimblebrain.ai/icons/outlook.png
        sizes: ["any"]
    remotes:
      - type: streamable-http
        url: https://backend.composio.dev/v3/mcp
    _meta:
      ai.nimblebrain/connector:
        defaultBinding: workspace
        auth: composio
        composio:
          toolkit: outlook
          authConfigEnv: COMPOSIO_OUTLOOK_AUTH_CONFIG_ID
          # Outlook publishes ~280 tools — curate aggressively.
          # Slugs verified against Composio's published catalog
          # (see `nb__search outlook` output for the full set).
          tools:
            - OUTLOOK_SEND_EMAIL
            - OUTLOOK_REPLY_EMAIL
            - OUTLOOK_FORWARD_MESSAGE
            - OUTLOOK_LIST_MESSAGES
            - OUTLOOK_LIST_SENT_ITEMS_MESSAGES
            - OUTLOOK_GET_MESSAGE
            - OUTLOOK_DELETE_MESSAGE
            - OUTLOOK_MOVE_MESSAGE
            - OUTLOOK_CREATE_DRAFT
            - OUTLOOK_SEND_DRAFT
            - OUTLOOK_LIST_MAIL_FOLDERS
            - OUTLOOK_LIST_EVENTS
            - OUTLOOK_CALENDAR_CREATE_EVENT
            - OUTLOOK_ACCEPT_EVENT
            - OUTLOOK_GET_PROFILE
        tags: [email, productivity, composio]

