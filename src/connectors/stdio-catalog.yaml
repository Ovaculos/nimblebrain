# Curated stdio bundle list — the NimbleBrain-blessed set of
# `@nimblebraininc/*` mpak bundles surfaced on the Browse page.
#
# Why this is separate from `catalog.yaml`:
#   - `catalog.yaml` carries remote-OAuth services (Asana, HubSpot, ...).
#     Different shape (URL + OAuth scopes) and different install path.
#   - This file carries stdio bundles installed via the mpak SDK.
#     They surface on Browse alongside OAuth entries and end up calling
#     `lifecycle.installNamed` (mpak bundle cache + registry under the
#     hood).
#
# Add a bundle by:
#   1. Releasing it to mpak with the published name `@nimblebraininc/<id>`.
#   2. Appending an entry below.
#
# Bundles published privately (e.g. tenant-specific Synapse apps) stay
# out of this list — they install via the chat agent's `bundleManagement`
# tool, not Browse.
#
# Schema (per entry):
#   id           kebab-case slug, primary key (required)
#   name         display name on the Browse card (required)
#   description  one-sentence description (required)
#   bundleName   scoped mpak package name passed to lifecycle.installNamed (required)
#   tags         optional list of tags (e.g., "needs-config", "synapse-app")
#   iconUrl      optional icon URL

bundles:
